<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beli Aja Sukodadi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <h2>🛵 Beli Aja Sukodadi</h2>
                </div>
                
                    <li><a href="#cart" class="cart-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </a></li>
            
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    

    <!-- Menu Section -->
    <section id="menu" class="menu-section">
        <div class="container">
            <h2 class="section-title">Menu Kami</h2>
            <div class="menu-categories">
                <button class="category-btn active" data-category="all">Semua</button>
                <button class="category-btn" data-category="makanan">Makanan</button>
                <button class="category-btn" data-category="minuman">Minuman</button>
                <button class="category-btn" data-category="snack">Snack</button>
            </div>
            <div class="menu-grid" id="menuGrid">
                <!-- Menu items akan dimuat oleh JavaScript -->
            </div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-shopping-cart"></i> Keranjang Pesanan</h3>
                <span class="close">&times;</span>
            </div>
            <div class="cart-items" id="cartItems">
                <p>Keranjang kosong</p>
            </div>
            <div class="cart-total">
                <h4>Total: <span id="cartTotal">Rp 0</span></h4>
            </div>
            <div class="cart-actions">
                <button class="btn-clear" id="clearCart">Kosongkan Keranjang</button>
                <a href="#" class="btn-wa" id="whatsappBtn">
                    <i class="fab fa-whatsapp"></i> Beli via WhatsApp
                </a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <img src="logo.png" width="100℅" alt="logo ngodingasik">
            <img src="logo1.png" width="100℅" alt="logo JI">
            <p>&copy; 2026 Ngoding_asik. Semua hak cipta dilindungi.</p>
            <p>Mau dibuatin aplikasi? Hub WhatsApp: <a href="https://wa.me/6289644300777">089644300777</a></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
